name: Deploy FastAPI to Kubernetes

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - "k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: kubestate-deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kubestate-recovery-lab-api
  K8S_NAMESPACE: stateful-app
  K8S_DEPLOYMENT: fastapi
  K8S_CONTAINER: fastapi
  PROJECT_NAME: KubeState Recovery Lab API
  ENVIRONMENT: dev
  POSTGRES_DB: kubestate
  POSTGRES_USER: kubestate
  BACKUP_PREFIX: postgres-backups

jobs:
  deploy:
    name: Build, push, and roll out
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: kubestate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Decode kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Temporarily allow this runner to reach Kubernetes API
        id: api_access
        run: |
          set -euo pipefail
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')"
          RUNNER_CIDR="$RUNNER_IP/32"
          PROJECT_SLUG="$(echo "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          ENVIRONMENT_SLUG="$(echo "$ENVIRONMENT" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          if [ "$PROJECT_SLUG" = "$ENVIRONMENT_SLUG" ] || [[ "$PROJECT_SLUG" == *-"$ENVIRONMENT_SLUG" ]]; then
            RESOURCE_PREFIX="$PROJECT_SLUG"
          else
            RESOURCE_PREFIX="$PROJECT_SLUG-$ENVIRONMENT_SLUG"
          fi
          SG_NAME="${RESOURCE_PREFIX}-ec2-sg"
          SG_ID="$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=$SG_NAME" "Name=tag:ManagedBy,Values=TerraPilot" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)"

          if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
            echo "No TerraPilot EC2 security group found for $SG_NAME; skipping temporary API ingress."
            echo "security_group_id=" >> "$GITHUB_OUTPUT"
            echo "runner_cidr=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXISTING_RULE_COUNT="$(aws ec2 describe-security-groups \
            --group-ids "$SG_ID" \
            --query "length(SecurityGroups[0].IpPermissions[?IpProtocol=='tcp' && FromPort==\`6443\` && ToPort==\`6443\`].IpRanges[?CidrIp=='$RUNNER_CIDR'][])" \
            --output text)"

          if [ "$EXISTING_RULE_COUNT" = "0" ]; then
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" \
              --ip-permissions "IpProtocol=tcp,FromPort=6443,ToPort=6443,IpRanges=[{CidrIp=$RUNNER_CIDR,Description=github-actions-${GITHUB_RUN_ID}}]"
            echo "revoke_api_access=true" >> "$GITHUB_OUTPUT"
          else
            echo "Temporary API ingress already exists for $RUNNER_CIDR; leaving it untouched after deploy."
            echo "revoke_api_access=false" >> "$GITHUB_OUTPUT"
          fi

          echo "security_group_id=$SG_ID" >> "$GITHUB_OUTPUT"
          echo "runner_cidr=$RUNNER_CIDR" >> "$GITHUB_OUTPUT"

      - name: Verify cluster connection
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Prepare schedulable nodes
        run: |
          set -euo pipefail
          READY_WORKERS="$(kubectl get nodes --no-headers | awk '$2 == "Ready" && $3 !~ /control-plane|master/ { count++ } END { print count + 0 }')"
          echo "Found $READY_WORKERS Ready worker node(s). Allowing the control-plane as lab overflow capacity."
          kubectl taint nodes --all node-role.kubernetes.io/control-plane- || true
          kubectl taint nodes --all node-role.kubernetes.io/master- || true
          kubectl get nodes -o wide

      - name: Install EBS CSI driver
        run: |
          set -euo pipefail

          dump_ebs_csi_diagnostics() {
            echo "::group::EBS CSI diagnostics"
            kubectl get nodes -o wide || true
            kubectl -n kube-system get deploy,daemonset,pods -o wide | grep -Ei 'ebs|csi' || true
            kubectl -n kube-system describe deployment ebs-csi-controller || true
            kubectl -n kube-system describe daemonset ebs-csi-node || true
            for pod in $(kubectl -n kube-system get pods -o name | grep -E 'ebs-csi|csi' || true); do
              kubectl -n kube-system describe "$pod" || true
              kubectl -n kube-system logs "$pod" --all-containers --tail=120 || true
            done
            kubectl -n kube-system get events --sort-by=.metadata.creationTimestamp | tail -n 80 || true
            echo "::endgroup::"
          }

          write_ebs_csi_values() {
            cat > /tmp/aws-ebs-csi-values.yaml <<'EOF'
          controller:
            serviceAccount:
              create: true
              name: ebs-csi-controller-sa
            tolerations:
              - key: CriticalAddonsOnly
                operator: Exists
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/master
                operator: Exists
                effect: NoSchedule
              - effect: NoExecute
                operator: Exists
                tolerationSeconds: 300
          node:
            tolerateAllTaints: true
          EOF
          }

          patch_ebs_csi_tolerations() {
            echo "Ensuring EBS CSI can run on a single-node/control-plane lab cluster..."
            kubectl -n kube-system patch deployment ebs-csi-controller --type='merge' -p '{
              "spec": {
                "template": {
                  "spec": {
                    "tolerations": [
                      {"key": "CriticalAddonsOnly", "operator": "Exists"},
                      {"key": "node-role.kubernetes.io/control-plane", "operator": "Exists", "effect": "NoSchedule"},
                      {"key": "node-role.kubernetes.io/master", "operator": "Exists", "effect": "NoSchedule"},
                      {"effect": "NoExecute", "operator": "Exists", "tolerationSeconds": 300}
                    ]
                  }
                }
              }
            }'
            kubectl -n kube-system patch daemonset ebs-csi-node --type='merge' -p '{
              "spec": {
                "template": {
                  "spec": {
                    "tolerations": [
                      {"operator": "Exists"}
                    ]
                  }
                }
              }
            }' || true
          }

          echo "Checking if EBS CSI driver is already installed..."
          if kubectl get deployment ebs-csi-controller -n kube-system >/dev/null 2>&1; then
            echo "EBS CSI controller deployment already exists; skipping install."
          else
            echo "Installing AWS EBS CSI driver via Helm..."
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
            helm repo update
            write_ebs_csi_values
            if ! helm upgrade --install aws-ebs-csi-driver aws-ebs-csi-driver/aws-ebs-csi-driver \
              --namespace kube-system \
              --version 2.27.0 \
              --values /tmp/aws-ebs-csi-values.yaml \
              --wait --timeout 5m; then
              dump_ebs_csi_diagnostics
              exit 1
            fi
          fi
          patch_ebs_csi_tolerations
          echo "Waiting for EBS CSI controller to be ready..."
          if ! kubectl -n kube-system rollout status deployment/ebs-csi-controller --timeout=180s; then
            dump_ebs_csi_diagnostics
            exit 1
          fi
          if ! kubectl -n kube-system get daemonset ebs-csi-node >/dev/null 2>&1; then
            echo "EBS CSI node DaemonSet is missing."
            dump_ebs_csi_diagnostics
            exit 1
          fi
          echo "Waiting for EBS CSI node DaemonSet to be ready..."
          if ! kubectl -n kube-system rollout status daemonset/ebs-csi-node --timeout=180s; then
            dump_ebs_csi_diagnostics
            exit 1
          fi

      - name: Apply storage class
        run: |
          set -euo pipefail
          kubectl apply -f k8s/storage/gp3-storageclass.yaml

      - name: Create runtime secrets
        env:
          POSTGRES_PASSWORD_VALUE: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$POSTGRES_PASSWORD_VALUE" ]; then
            echo "::error::GitHub secret POSTGRES_PASSWORD is required and must not be empty."
            exit 1
          fi

          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$K8S_NAMESPACE" create secret generic postgres-secret \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD_VALUE" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$K8S_NAMESPACE" create secret generic fastapi-secret \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD_VALUE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ECR pull secret
        run: |
          set -euo pipefail
          ECR_REGISTRY="${IMAGE_URI%%/*}"
          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"
          kubectl -n "$K8S_NAMESPACE" create secret docker-registry ecr-pull-secret \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$ECR_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backup config from Terraform metadata
        run: |
          set -euo pipefail
          ENVIRONMENT_SLUG="$(echo "$ENVIRONMENT" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"
          BACKUP_BUCKET_PARAMETER="/kubestate-recovery-lab/$ENVIRONMENT_SLUG/postgres-backup-bucket"
          BACKUP_BUCKET="$(aws ssm get-parameter \
            --name "$BACKUP_BUCKET_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)"

          kubectl -n "$K8S_NAMESPACE" create configmap postgres-backup-config \
            --from-literal=S3_BACKUP_BUCKET="$BACKUP_BUCKET" \
            --from-literal=S3_BACKUP_PREFIX="$BACKUP_PREFIX" \
            --from-literal=AWS_REGION="$AWS_REGION" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          dump_stateful_app_diagnostics() {
            echo "::group::Stateful app diagnostics"
            kubectl get nodes -o wide || true
            kubectl get storageclass,pv -o wide || true
            kubectl -n "$K8S_NAMESPACE" get deploy,sts,svc,ingress,pods,pvc -o wide || true
            kubectl -n "$K8S_NAMESPACE" get endpoints postgres redis -o wide || true
            kubectl -n "$K8S_NAMESPACE" get svc postgres redis -o yaml || true
            kubectl -n kube-system get pods -l k8s-app=kube-dns -o wide || true
            kubectl -n kube-system logs -l k8s-app=kube-dns --tail=100 || true
            kubectl -n "$K8S_NAMESPACE" describe statefulset/postgres || true
            kubectl -n "$K8S_NAMESPACE" describe statefulset/redis || true
            kubectl -n "$K8S_NAMESPACE" describe deployment/"$K8S_DEPLOYMENT" || true
            kubectl -n "$K8S_NAMESPACE" describe pods -l app=fastapi || true
            kubectl -n "$K8S_NAMESPACE" logs -l app=fastapi --all-containers --tail=200 || true
            kubectl -n "$K8S_NAMESPACE" logs -l app=fastapi --all-containers --previous --tail=200 || true
            kubectl -n "$K8S_NAMESPACE" exec deploy/fastapi -- nslookup postgres || true
            kubectl -n "$K8S_NAMESPACE" exec deploy/fastapi -- nslookup redis || true
            for pod in $(kubectl -n "$K8S_NAMESPACE" get pods -o name || true); do
              kubectl -n "$K8S_NAMESPACE" describe "$pod" || true
              kubectl -n "$K8S_NAMESPACE" logs "$pod" --all-containers --tail=200 || true
              kubectl -n "$K8S_NAMESPACE" logs "$pod" --all-containers --previous --tail=200 || true
            done
            kubectl -n "$K8S_NAMESPACE" get events --sort-by=.metadata.creationTimestamp || true
            echo "::endgroup::"
          }

          wait_for_rollout() {
            local description="$1"
            shift
            echo "Waiting for $description to be ready..."
            if ! "$@"; then
              dump_stateful_app_diagnostics
              exit 1
            fi
          }

          kubectl apply -k k8s/stateful-app

          echo "Pointing FastAPI deployment at the image built by this workflow..."
          kubectl -n "$K8S_NAMESPACE" set image "deployment/$K8S_DEPLOYMENT" "$K8S_CONTAINER=$IMAGE_URI"

          POSTGRES_POD_PGDATA="$(kubectl -n "$K8S_NAMESPACE" get pod postgres-0 -o jsonpath='{.spec.containers[?(@.name=="postgres")].env[?(@.name=="PGDATA")].value}' 2>/dev/null || true)"
          if [ "$POSTGRES_POD_PGDATA" != "/var/lib/postgresql/data/pgdata" ]; then
            echo "Deleting stale postgres-0 pod so StatefulSet recreates it with PGDATA=/var/lib/postgresql/data/pgdata..."
            kubectl -n "$K8S_NAMESPACE" delete pod postgres-0 --ignore-not-found --wait=false
          fi

          wait_for_rollout "PostgreSQL StatefulSet" kubectl -n "$K8S_NAMESPACE" rollout status statefulset/postgres --timeout=300s
          wait_for_rollout "Redis StatefulSet" kubectl -n "$K8S_NAMESPACE" rollout status statefulset/redis --timeout=180s

          wait_for_rollout "FastAPI Deployment" kubectl -n "$K8S_NAMESPACE" rollout status "deployment/$K8S_DEPLOYMENT" --timeout=240s

      - name: Show rollout state
        if: always()
        run: |
          kubectl -n "$K8S_NAMESPACE" get deploy,sts,svc,ingress,pods -o wide || true
          kubectl -n "$K8S_NAMESPACE" get events --sort-by=.metadata.creationTimestamp | tail -n 40 || true

      - name: Revoke temporary Kubernetes API access
        if: always() && steps.api_access.outputs.security_group_id != '' && steps.api_access.outputs.revoke_api_access == 'true'
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ steps.api_access.outputs.security_group_id }}" \
            --protocol tcp \
            --port 6443 \
            --cidr "${{ steps.api_access.outputs.runner_cidr }}" \
            || true
